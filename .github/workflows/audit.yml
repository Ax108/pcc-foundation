name: Security Audit

on:
  push:
    paths:
      - 'package.json'
      - 'bun.lock'
  pull_request:
    paths:
      - 'package.json'
      - 'bun.lock'

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: bun audit

      - name: Check for new postinstall scripts
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const nm = './node_modules';
          const ALLOWED = ['esbuild', 'protobufjs', 'core-js', 'unrs-resolver'];
          let violations = [];
          fs.readdirSync(nm).forEach(pkg => {
            try {
              const p = JSON.parse(fs.readFileSync(path.join(nm, pkg, 'package.json'), 'utf8'));
              const s = p.scripts || {};
              if ((s.postinstall || s.preinstall || s.install) && !ALLOWED.includes(pkg)) {
                violations.push({ pkg, scripts: s });
              }
            } catch {}
          });
          if (violations.length > 0) {
            console.error('UNEXPECTED INSTALL SCRIPTS DETECTED:');
            console.error(JSON.stringify(violations, null, 2));
            process.exit(1);
          } else {
            console.log('All install scripts are from known-safe packages.');
          }
          "
