<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon and icons (generated via favicon.io from icon-source-512) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#631318" />
    <meta name="msapplication-TileColor" content="#631318" />
    <meta name="msapplication-TileImage" content="/android-chrome-192x192.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pratima Chandra Foundation" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Primary meta (updated by useSEO hook per route) -->
    <title>Pratima Chandra Foundation</title>
    <meta name="title" content="Pratima Chandra Foundation" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pratimachandrafoundation.org/" />
    <meta property="og:title" content="Pratima Chandra Foundation" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="https://pratimachandrafoundation.org/assets/logo/logo-full.jpg" />
    <meta property="og:site_name" content="Pratima Chandra Foundation" />
    <meta property="og:locale" content="en_IN" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pratima Chandra Foundation" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="https://pratimachandrafoundation.org/assets/logo/logo-full.jpg" />

    <link rel="canonical" href="https://pratimachandrafoundation.org/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kodchasan:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- LCP candidate — must match IMAGES.LOGO_HEADER in images.ts -->
    <link
      rel="preload"
      as="image"
      href="/assets/logo/logo-header.jpg"
      fetchpriority="high"
    />

    <!-- Preload Font Awesome woff2 before JS injects the subset style tag -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-brands-400.woff2"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
